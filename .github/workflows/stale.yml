# 自动關閉过期的 Issues 和 PR
# 每天檢查一次，标记长时间无回應的 issues/PRs

name: Stale Issues & PRs

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）檢查一次
    - cron: '0 0 * * *'
  # 支援手动触发
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: 🧹 清理过期 Issues/PRs
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏷️ 标记并關閉过期内容
        uses: actions/stale@v10
        with:
          # ===== Issue 配置 =====
          days-before-issue-stale: 7
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 这个 Issue 已經 **7 天** 没有活动了。
            
            如果議題仍然存在，请回复说明最新情况，我们会繼續跟进。
            如果議題已解決或不再需要，可以直接關閉此 Issue。
            
            **如果 7 天内没有回复，此 Issue 将自动關閉。**
          close-issue-message: |
            🔒 由于长时间没有活动，此 Issue 已自动關閉。
            
            如果議題仍然存在，欢迎重新打开或建立新的 Issue。
          
          # ===== PR 配置 =====
          days-before-pr-stale: 21
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 这个 PR 已經 **21 天** 没有活动了。
            
            请檢查是否需要：
            - 解決合併冲突
            - 回复 review 意见
            - 更新代碼
            
            **如果 14 天内没有更新，此 PR 将自动關閉。**
          close-pr-message: |
            🔒 由于长时间没有活动，此 PR 已自动關閉。
            
            如果您仍希望合入这些更改，请重新打开或建立新的 PR。
          
          # ===== 排除規則 =====
          # 带有这些標籤的不会被标记为 stale
          exempt-issue-labels: 'pinned,security,enhancement,help wanted,good first issue'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'
          
          # 排除草稿 PR
          exempt-draft-pr: true
          
          # ===== 其他配置 =====
          # 每次執行最多處理的数量
          operations-per-run: 50
          
          # 只處理这些狀態的
          only-labels: ''
          
          # 移除 stale 標籤（当有新活动时）
          remove-stale-when-updated: true
          
          # 调试模式（设为 true 时只打印不實際操作）
          debug-only: false
