# Dragon Head Strategy / 龙头策略
# Identifies sector leaders during sector rotation cycles.

name: dragon_head
display_name: 龙头策略
description: 板塊轮动中识别龙头股。适用于板塊啟動或行业催化剂出现时。
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news
aliases: [龙头, 龙头战法]
default_priority: 90
market_regimes: [sector_hot]

instructions: |
  **龙头策略（Dragon Head Strategy）**

  评估标准：

  1. **板塊领涨地位**：
     - 使用 `get_sector_rankings` 检查该股所在板塊是否为近期涨幅前列。
     - 确认该股是否在板塊啟動周期中率先上涨或漲停。

  2. **换手率与动能**（关联理念7：强势趨勢股放宽）：
     - 使用 `get_realtime_quote` 检查换手率。龙头股换手率通常 > 5%。
     - 量比 > 1.5 说明有活跃的交易兴趣。

  3. **相对强度**：
     - 对比個股漲跌幅与板塊平均值。
     - 真正的龙头在上涨日应跑赢板塊 2% 以上。

  4. **新闻催化**：
     - 使用 `search_stock_news` 搜索板塊级催化剂（政策、事件、业绩）。
     - 龙头行情常伴随板塊整体催化。

  5. **乖离率检查**（关联理念1：严进策略）：
     - 龙头股可适当放宽乖离率至 7%，但超过 10% 仍需谨慎。

  評分调整：
  - 确认为龙头股：sentiment_score +10
  - 板塊正处于主动轮动期：额外 +5
  - 在 `buy_reason` 中注明"龙头策略"判断结果。
