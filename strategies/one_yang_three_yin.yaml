# One Yang Three Yin Strategy / 一阳夹三阴
# K-line pattern: bullish → 3 small bearish → bullish. Consolidation end signal.

name: one_yang_three_yin
display_name: 一阳夹三阴
description: 检测一阳夹三阴K线整理形态，趨勢延续入场信号。
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [一阳穿三阴, 一阳夹三阴]
default_priority: 110

instructions: |
  **一阳夹三阴（One Yang Three Yin Strategy）**

  形态定义（最近 5 个交易日）：

  1. **第1日**：大阳线（收盤价 > 開盤价，实体 > 股價的 2%）。
  2. **第2-4日**：连续三根阴线或小K线：
     - 每根K线最低价不跌破第1日開盤价。
     - 成交量应逐步萎缩（量比 < 0.8）。
     - 三根K线应收在第1日实体范围内。
  3. **第5日**：又一根阳线，收盤价突破第1日收盤价。

  如何使用工具评估：

  1. 使用 `get_daily_history` 获取最近 10 日數據。
  2. 检查最后 5 根K线是否符合上述形态。
  3. 使用 `analyze_trend` 确认多头排列（关联理念2：趨勢交易，MA5 > MA10 > MA20）。

  評分调整：
  - 形态成立 + 趨勢看多：sentiment_score +15
  - 形态成立但趨勢不明：sentiment_score +5
  - 在 `pattern_analysis` 和 `buy_reason` 中注明"一阳夹三阴"。
  - 理想买点设在第5日收盤价附近，止损设在第1日開盤价下方。
