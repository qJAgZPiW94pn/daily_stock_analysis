# Growth Quality Strategy / 成长质量

name: growth_quality
display_name: 成长质量
description: 结合收入利潤增长、ROE、现金流和行业空间，识别高质量成长股与成长失速風險。
category: framework
core_rules: [2, 3, 5]
required_tools:
  - get_stock_info
  - get_realtime_quote
  - search_stock_news
  - analyze_trend
aliases: [成长, 成长股, 成长质量]
default_priority: 55
market_regimes: [trending_up]

instructions: |
  **成长质量策略（Growth Quality Strategy）**

  适用場景：
  - 关注公司中长期成长能力，而不是只看短线技术形态。
  - 适合高景气行业、业绩持续改善或商业模式扩张阶段的公司。

  分析框架：

  1. **成长性**
     - 優先查看财报欄位中的营业收入、归母净利潤、经营现金流和 ROE。
     - 判斷收入增长和利潤增长是否同向，是否存在“增收不增利”。
     - 若只有概念热度但财报尚未驗證，应降低成长確定性。

  2. **质量**
     - ROE 越高且稳定，质量越好。
     - 经营现金流与净利潤方向一致，说明盈利质量更可靠。
     - 现金流显著弱于利潤时，要提示回款、存货或应收風險。

  3. **估值承受力**
     - 使用 PE/PB、市值等估值欄位判斷市场是否已經提前透支成长。
     - 高成长可承受更高估值，但必须说明增长能否覆盖估值。
     - 估值高且成长放缓时，应明显下调評分。

  4. **趨勢确认**
     - 使用 `analyze_trend` 判斷长期成长邏輯是否被市场資金确认。
     - 基本面向好但技术面未确认时，優先给观察條件而不是直接追买。

  輸出要求：
  - 明確公司处于：高质量成长 / 成长驗證中 / 成长放缓 / 成长证伪。
  - 说明成长来自收入扩张、利潤率改善、行业景气，还是一次性因素。
  - 给出适合成长股的买点：业绩驗證后突破、回踩长期均线或估值回落。

  評分調整建议：
  - 收入、利潤、现金流和 ROE 同向改善：`sentiment_score +15`
  - 行业景气与公司新闻互相驗證：额外 `+6`
  - 高估值但成长未驗證：`sentiment_score -8`
  - 增收不增利或现金流恶化：`sentiment_score -12`
