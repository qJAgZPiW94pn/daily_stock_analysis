# Default Bull Trend Strategy / 預設多头趨勢

name: bull_trend
display_name: 預設多头趨勢
description: 預設個股分析優先策略，识别多头排列、趨勢延续与回踩低吸机会。
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [趨勢, 趨勢分析, 多头趨勢]
default_active: true
default_router: true
default_priority: 10
market_regimes: [trending_up]

instructions: |
  **預設多头趨勢（Default Bull Trend Strategy）**

  适用場景：
  - 常规個股分析的預設策略。
  - 優先寻找“趨勢向上 + 風險可控 + 不追高”的机会。

  分析框架：

  1. **趨勢确认（優先级最高）**
     - 使用 `analyze_trend` 判斷 MA5/MA10/MA20 排列。
     - MA5 >= MA10 >= MA20 且 MA20 斜率向上，视为多头结构。
     - 若价格显著跌破 MA20，则降低看多權重。

  2. **位置与节奏**
     - 優先“回踩不破”而非“高位追涨”。
     - 当价格距离 MA5/MA10 过远时，提示等待回踩。
     - 放量突破有效阻力时可提高胜率评级。

  3. **量价驗證**
     - 使用 `get_daily_history` 檢查突破日/反弹日是否放量。
     - 缩量上涨需谨慎，放量滞涨需警惕分歧。

  4. **交易建议輸出**
     - 輸出明確的“買入/观望/减仓”倾向及触发條件。
     - 必须给出止损參考（如 MA20 下方或结构低点）。
     - 若无清晰优势，明確写“暂不出手”，避免过度交易。

  評分調整建议：
  - 多头排列 + 趨勢强度良好：`sentiment_score +12`
  - 回踩關鍵均线后企稳：`sentiment_score +8`
  - 放量突破關鍵阻力：`sentiment_score +10`
  - 跌破 MA20 或趨勢转弱：`sentiment_score -12`
