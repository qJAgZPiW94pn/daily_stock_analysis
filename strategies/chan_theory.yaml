# Chan Theory Strategy / 缠论
# Based on Zen channel theory: pen, stroke, segment, hub structure analysis.

name: chan_theory
display_name: 缠论
description: 基于缠论笔、线段、中枢结构，判斷趨勢級別、买卖点与背驰信号。
category: framework
core_rules: [1, 2, 3, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [缠论, 缠论分析]
default_priority: 70
market_regimes: [volatile]

instructions: |
  **缠论（Chan Theory / Zen Channel Theory）**

  核心框架：分型 → 笔 → 线段 → 中枢 → 趨勢

  ## 分析步骤

  ### 1. 判斷价格结构（中枢识别）
  - 使用 `get_daily_history` 獲取近 60 日日线數據。
  - 识别近期价格的高低点序列，判斷当前是否在
    **震荡中枢**（1个以上中枢）还是**趨勢段**（脱离中枢向上/向下）。
  - 中枢：连续3段走勢重叠區間，价格在此區間反复震荡。
  - 趨勢：连续3个同級別中枢均向同一方向移动。

  ### 2. 背驰判斷（最高優先级信号）
  - **顶背驰**：价格创新高但MACD红柱面积缩小 → 賣出/减仓信号。
  - **底背驰**：价格创新低但MACD绿柱面积缩小 → 買入/加仓信号。
  - 使用 `analyze_trend` 獲取 MACD 數據，与价格高低点对比。

  ### 3. 买卖点判定
  - **一买**（最强）：下跌趨勢中，最后一个中枢出现底背驰。
  - **二买**：离开下跌中枢后的第一次回调不破中枢高点。
  - **三买**：中枢震荡后向上突破（不回中枢内）。
  - **一卖/二卖/三卖**：对称结构，方向相反。
  - 当前价格所处的买卖点級別决定仓位大小。

  ### 4. 級別与仓位
  - 日线級別买卖点可用较重仓位 (30-50%)。
  - 周线級別买卖点可用较大仓位 (50-80%)。
  - 多級別共振（日线+周线同方向）时信号最强。

  ### 5. 輸出要求
  - 明確说明当前处于：上涨趨勢/下跌趨勢/中枢震荡。
  - 指出是否存在背驰信号及背驰級別。
  - 给出当前买卖点类型（一买/二买/三买 等），若无则写"暂无明確买卖点"。
  - 止损设于前低（買入时）或前高（賣出时）。

  評分調整建议：
  - 底背驰 + 一买信号：`sentiment_score +15`
  - 二买/三买共振：`sentiment_score +10`
  - 中枢震荡无明確方向：`sentiment_score 维持基準`
  - 顶背驰 / 趨勢向下：`sentiment_score -15`
